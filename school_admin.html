<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>学校数据维护后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="max-w-6xl mx-auto p-4 space-y-4">
    <div class="bg-white rounded-xl p-4 shadow">
      <h1 class="text-lg font-black">公办/民办学校数据维护后台</h1>
      <p class="text-xs text-gray-500 mt-1">支持按学校类型检索、编辑并保存核心字段（即时写入数据库）。</p>
    </div>

    <div id="login" class="bg-white rounded-xl p-4 shadow space-y-3">
      <div class="text-sm font-bold">管理员登录</div>
      <input id="pwd" type="password" placeholder="请输入管理口令" class="w-full border rounded p-2" />
      <button onclick="login()" class="bg-orange-500 text-white px-4 py-2 rounded font-bold">登录</button>
      <div id="login-tip" class="text-xs text-gray-500"></div>
    </div>

    <div id="panel" class="hidden space-y-4">
      <div class="bg-white rounded-xl p-4 shadow flex gap-2 items-center">
        <select id="type" class="border rounded p-2">
          <option value="public">公办</option>
          <option value="private">民办</option>
        </select>
        <input id="kw" placeholder="搜索学校名（可空）" class="border rounded p-2 flex-1" />
        <button onclick="loadSchools()" class="bg-blue-500 text-white px-3 py-2 rounded">查询</button>
      </div>

      <div class="bg-white rounded-xl p-4 shadow overflow-auto">
        <table class="w-full text-xs border-collapse">
          <thead>
            <tr class="bg-gray-100 text-left">
              <th class="p-2">ID</th><th class="p-2">学校名</th><th class="p-2">2025招生</th><th class="p-2">2025报名</th><th class="p-2">2025录取</th><th class="p-2">电话</th><th class="p-2">备注</th><th class="p-2">操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
const API_CANDIDATES = ['./api.php', '/api.php', '../api.php'];
let API_URL = './api.php';
let adminPwd = '';

function esc(v){ return (v ?? '').toString().replace(/"/g,'&quot;'); }

async function resolveApiUrl() {
  for (const u of API_CANDIDATES) {
    try {
      const r = await fetch(`${u}?action=school_admin_list&type=public&pwd=__probe__`);
      // 接口可达时通常返回 JSON（未授权也算可达）
      const ct = (r.headers.get('content-type') || '').toLowerCase();
      if (ct.includes('application/json')) {
        API_URL = u;
        return true;
      }
    } catch (e) {}
  }
  return false;
}

async function login(){
  adminPwd = document.getElementById('pwd').value.trim();
  const tip = document.getElementById('login-tip');
  if(!adminPwd){ return alert('请输入口令'); }
  try {
    tip.innerText = '正在连接接口...';
    const ok = await resolveApiUrl();
    if (!ok) {
      tip.innerText = '无法找到 api.php（已尝试 ./api.php、/api.php、../api.php）。';
      return alert('登录失败：未检测到可用接口路径。');
    }
    tip.innerText = `接口已连接：${API_URL}，正在登录...`;
    const res = await fetch(`${API_URL}?action=school_admin_list&type=public&pwd=${encodeURIComponent(adminPwd)}`);
    const data = await res.json();
    if(!data.success){ tip.innerText = ''; return alert(data.message || '登录失败'); }
    document.getElementById('login').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    await loadSchools();
  } catch (e) {
    tip.innerText = '登录失败：无法访问接口。请确认同域部署，并检查 Nginx/Apache 是否放行 api.php。';
    alert('登录失败：网络或部署路径异常，请检查控制台错误。');
    console.error('school_admin login error', e);
  }
}

async function loadSchools(){
  const type = document.getElementById('type').value;
  const kw = document.getElementById('kw').value.trim();
  try {
    const res = await fetch(`${API_URL}?action=school_admin_list&type=${type}&kw=${encodeURIComponent(kw)}&pwd=${encodeURIComponent(adminPwd)}`);
    const data = await res.json();
    if(!data.success){ return alert(data.message || '加载失败'); }

  const rows = data.rows || [];
  const tb = document.getElementById('tbody');
  tb.innerHTML = rows.map(r => `
    <tr class="border-b hover:bg-orange-50">
      <td class="p-2">${r.id}</td>
      <td class="p-2 font-bold">${r.school_name || ''}</td>
      <td class="p-2"><input id="enr-${r.id}" value="${esc(r.enrollment_2025)}" class="border rounded p-1 w-20"></td>
      <td class="p-2"><input id="sgn-${r.id}" value="${esc(r.signup_2025)}" class="border rounded p-1 w-20"></td>
      <td class="p-2"><input id="adm-${r.id}" value="${esc(r.admit_2025)}" class="border rounded p-1 w-20"></td>
      <td class="p-2"><input id="tel-${r.id}" value="${esc(r.contact_phone)}" class="border rounded p-1 w-32"></td>
      <td class="p-2"><input id="rmk-${r.id}" value="${esc(r.remark)}" class="border rounded p-1 w-60"></td>
      <td class="p-2"><button onclick="saveRow(${r.id})" class="bg-green-600 text-white px-2 py-1 rounded">保存</button></td>
    </tr>
  `).join('');
  } catch (e) {
    alert('加载失败：请确认 api.php 可访问');
    console.error('school_admin list error', e);
  }
}

document.getElementById('pwd').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
window.addEventListener('DOMContentLoaded', async () => {
  const tip = document.getElementById('login-tip');
  tip.innerText = '正在检测接口路径...';
  const ok = await resolveApiUrl();
  tip.innerText = ok ? `检测到接口：${API_URL}` : '未检测到接口路径，请将 school_admin.html 与 api.php 放在同一站点下。';
});

async function saveRow(id){
  const type = document.getElementById('type').value;
  const payload = {
    id,
    enrollment_2025: document.getElementById(`enr-${id}`).value.trim(),
    signup_2025: document.getElementById(`sgn-${id}`).value.trim(),
    admit_2025: document.getElementById(`adm-${id}`).value.trim(),
    contact_phone: document.getElementById(`tel-${id}`).value.trim(),
    remark: document.getElementById(`rmk-${id}`).value.trim(),
  };

  const res = await fetch(`${API_URL}?action=school_admin_update&type=${type}&pwd=${encodeURIComponent(adminPwd)}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if(!data.success){ return alert(data.message || '保存失败'); }
  alert('保存成功');
}
</script>
</body>
</html>
